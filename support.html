<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Support — Maevin Labs</title>
  <meta name="description" content="Support page for Maevin Labs LLC." />
  <link rel="icon" type="image/png" href="/assets/Logo_blue.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/Logo_blue.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/Logo_blue.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/Logo_blue.png" />
  <style>
    :root {
      --bg: #0d1017;
      --card: rgba(24, 29, 40, 0.72);
      --text: #f5f7fb;
      --muted: rgba(227,232,242,0.74);
      --accent: #60a5fa;
      --accent-soft: rgba(96,165,250,0.16);
      --radius: 14px;
      --shadow: 0 24px 60px rgba(0,0,0,.42);
      --border: rgba(255,255,255,0.12);
    }
    :root{ --aurora1:#60a5fa; --aurora2:#38bdf8; --aurora3:#f472b6; --aurora4:#facc15; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      background:
        radial-gradient(circle at top left, rgba(244,114,182,.18), transparent 28%),
        radial-gradient(circle at 85% 14%, rgba(96,165,250,.20), transparent 26%),
        radial-gradient(circle at 50% 100%, rgba(250,204,21,.12), transparent 30%),
        linear-gradient(180deg, #171b25 0%, var(--bg) 45%, #090b11 100%);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    a { color: var(--text); text-decoration: none; }
    a:focus-visible { outline: 2px solid rgba(96,165,250,.45); outline-offset: 2px; }

    .wrap { max-width: 900px; margin: 0 auto; padding: 28px 20px 80px; position: relative; isolation: isolate; }

    header { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .brand { display: flex; align-items: center; gap: 12px; }
    .brand h1 { font-size: 22px; font-weight: 700; letter-spacing: .3px; margin: 0; color: var(--text); }
    nav a { position: relative; opacity: .8; margin-left: 18px; font-size: 14px; color: var(--text); }
    nav a:hover { opacity: 1; }
    nav a::after {
      content: "";
      position: absolute;
      left: 0;
      bottom: -6px;
      height: 2px;
      width: 100%;
      background: var(--accent);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform .3s ease;
    }
    nav a:hover::after { transform: scaleX(1); }
    /* Shared header pieces (from index) */
    .socials-inline { display:inline-flex; gap:10px; align-items:center; }
    .socials-inline a { width:22px; height:22px; display:inline-flex; align-items:center; justify-content:center; }
    .socials-inline svg { width:14px; height:14px; fill: var(--text); opacity:.9; }
    .nav-sep { color: var(--accent); font-weight:700; opacity:.95; display:inline-flex; align-items:center; justify-content:center; width:24px; }

    h1.page-title {
      font-size: clamp(28px, 6vw, 40px);
      line-height: 1.1;
      margin: 24px 0 10px;
      background: linear-gradient(90deg, var(--aurora1), var(--aurora2), var(--aurora3), var(--aurora4));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      background-size: 200% 100%;
      animation: titleSweep 10s ease-in-out infinite;
    }
    .intro { color: var(--muted); margin: 0 0 28px; font-size: 16px; }

    .support-theme .wrap::after{
      content:""; position:absolute; z-index:-1; pointer-events:none;
      left:-8px; right:-8px; top:54px; bottom:46px; border-radius: 22px;
      filter: blur(16px) saturate(1.08);
      opacity: .95;
      background:
        linear-gradient(90deg, rgba(96,165,250,0) 0%, rgba(96,165,250,.90) 12%, rgba(96,165,250,0) 26%)   -30% 18% / 220% 7px no-repeat,
        linear-gradient(90deg, rgba(56,189,248,0) 0%, rgba(56,189,248,.92) 10%, rgba(56,189,248,0) 24%)   -40% 32% / 240% 6px no-repeat,
        linear-gradient(90deg, rgba(244,114,182,0) 0%, rgba(244,114,182,.95) 12%, rgba(244,114,182,0) 28%)  -35% 52% / 260% 9px no-repeat,
        linear-gradient(90deg, rgba(250,204,21,0) 0%, rgba(250,204,21,.88) 10%, rgba(250,204,21,0) 25%)   -45% 68% / 240% 7px no-repeat,
        radial-gradient(34% 42% at 12% 82%, rgba(244,114,182,.18), transparent 72%),
        radial-gradient(32% 34% at 84% 14%, rgba(96,165,250,.18), transparent 72%);
      animation: trailsB 12s linear infinite;
    }
    @keyframes trailsB{
      0%{   background-position: -30% 18%, -40% 32%, -35% 52%, -45% 68%, 0 0, 0 0; }
      100%{ background-position: 140% 18%, 140% 32%, 140% 52%, 140% 68%, 0 0, 0 0; }
    }

    /* Title: understated console cursor accent */
    .support-theme h1.page-title{ position: relative; }

    /* Subtle link hover underline that matches theme */
    .support-theme a { text-decoration: none; }
    .support-theme a:hover { text-decoration: underline; text-decoration-color: var(--accent); }

    /* Respect reduced motion: disable cursor blink */
    @media (prefers-reduced-motion: reduce){
      .support-theme h1.page-title::after{ animation: none !important; opacity:.5; }
      .support-theme .wrap::after{ animation: none !important; }
    }

    /* Refined reveal animations */
    .reveal { opacity: 0; transform: translateY(12px); }
    .reveal.in { opacity: 1; transform: none; transition: opacity .4s ease, transform .4s ease; }
    .reveal.s1.in { transition-delay: .05s; }
    .reveal.s2.in { transition-delay: .10s; }
    .reveal.s3.in { transition-delay: .15s; }
    @media (max-width: 700px) {
      .wrap {
        padding: 18px 16px 56px;
      }
      .support-theme .wrap::after{
        left: -4px;
        right: -4px;
        top: 42px;
        bottom: auto;
        height: min(38vh, 260px);
        opacity: .72;
      }
      h1.page-title {
        margin: 18px 0 8px;
        font-size: clamp(30px, 11vw, 40px);
      }
      .intro {
        margin: 0 0 20px;
        font-size: 15px;
      }
      section.card {
        margin: 12px 0;
      }
      section.card h2 {
        font-size: 17px;
      }
      section.card p,
      section.card li {
        font-size: 15px;
        line-height: 1.65;
      }
      ul {
        padding-left: 16px;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .reveal, .reveal.in { opacity: 1 !important; transform: none !important; transition: none !important; }
    }

    section.card {
      background: transparent;
      border: 0;
      border-radius: 0;
      padding: 0;
      box-shadow: none;
      margin: 18px 0;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }
    section.card h2 { margin-top: 6px; font-size: 18px; }
    section.card p, section.card li { color: var(--muted); line-height: 1.6; font-size: 15px; }
    ul { padding-left: 18px; }

    footer { text-align: center; margin: 64px 0 20px; color: var(--muted); font-size: 14px; }
  </style>
</head>
<body class="support-theme">
  <div class="wrap">
    <div id="site-header"></div>
    <script>
      (async () => {
        try {
          const r = await fetch('/header.html', { cache: 'no-cache' });
          const html = await r.text();
          const mount = document.getElementById('site-header');
          if (mount) mount.outerHTML = html;
        } catch (_) {}
      })();
    </script>

    <h1 class="page-title">Support</h1>
    <p class="intro">Need help? Find answers below or reach out directly.</p>

    <section class="card">
      <h2>How to Reach Us</h2>
      <p>For support, email us at <a href="mailto:hello@maevinlabs.com">hello@maevinlabs.com</a>.</p>

      <h2>FAQs</h2>
      <ul>
        <li><strong>Q: How do I report a bug?</strong><br>A: Please email us with a description and screenshots.</li>
      </ul>
    </section>

    <div id="site-footer"></div>
    <script>
      (async () => {
        try {
          const r = await fetch('/footer.html', { cache: 'no-cache' });
          const html = await r.text();
          const mount = document.getElementById('site-footer');
          if (mount) mount.outerHTML = html;
        } catch (_) {}
      })();
    </script>
  </div>
<script>
(function(){
  const els = [];
  const add = (sel, extra="") => document.querySelectorAll(sel).forEach((n)=>{ n.classList.add('reveal'); if(extra) n.classList.add(extra); els.push(n); });
  add('h1.page-title','s1');
  add('.intro','s2');
  add('section.card','s3');
  if('IntersectionObserver' in window){
    const io = new IntersectionObserver((entries)=>{
      entries.forEach(e=>{ if(e.isIntersecting){ e.target.classList.add('in'); io.unobserve(e.target);} });
    },{threshold:.14});
    els.forEach(el=>io.observe(el));
  } else { els.forEach(el=>el.classList.add('in')); }
})();
</script>
</body>
</html>
