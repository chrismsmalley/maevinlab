<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Page Not Found — Maevin Labs</title>
  <meta name="description" content="The page you were looking for is not here." />
  <meta property="og:title" content="Page Not Found — Maevin Labs" />
  <meta property="og:description" content="The page you were looking for is not here." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://maevinlabs.com/404.html" />
  <meta property="og:image" content="https://maevinlabs.com/assets/Logo_blue.png" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="Page Not Found — Maevin Labs" />
  <meta name="twitter:description" content="The page you were looking for is not here." />
  <meta name="twitter:image" content="https://maevinlabs.com/assets/Logo_blue.png" />
  <link rel="canonical" href="https://maevinlabs.com/404.html" />
  <link rel="icon" type="image/png" href="/assets/Logo_blue.png" />
  <style>
    :root {
      --bg: #fcfcfb;
      --text: #0f172a;
      --muted: rgba(15,23,42,0.72);
      --accent: #60a5fa;
      --line: rgba(15,23,42,0.08);
    }
    html, body { height: 100%; }
    body {
      margin: 0;
      background:
        radial-gradient(circle at 16% 8%, rgba(96,165,250,.08), transparent 24%),
        radial-gradient(circle at 82% 14%, rgba(244,114,182,.05), transparent 20%),
        linear-gradient(180deg, #fcfcfb 0%, #f8f8f7 22%, var(--bg) 52%, var(--bg) 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Inter, Helvetica, Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    a { color: inherit; text-decoration: none; }
    .wrap { max-width: 1120px; margin: 0 auto; padding: 0 20px 56px; }
    .shell {
      min-height: calc(100vh - 100px);
      display: grid;
      place-items: center;
      text-align: center;
    }
    .panel {
      max-width: 680px;
      padding: 40px 0;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      display: grid;
      gap: 18px;
    }
    .eyebrow {
      margin: 0;
      font-size: 12px;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--accent);
    }
    h1 {
      margin: 0;
      font-size: clamp(48px, 10vw, 96px);
      line-height: .9;
      letter-spacing: -.06em;
    }
    p {
      margin: 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.8;
    }
    .links {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .links a {
      color: var(--accent);
      font-weight: 600;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div id="site-header"></div>
    <script>
      (async () => {
        try {
          const r = await fetch('/header.html', { cache: 'no-cache' });
          const html = await r.text();
          const mount = document.getElementById('site-header');
          if (mount) mount.outerHTML = html;
        } catch (_) {}
      })();
    </script>

    <main class="shell">
      <section class="panel">
        <p class="eyebrow">404</p>
        <h1>Not here.</h1>
        <p>The page you were looking for is gone, moved, or never existed in the first place.</p>
        <div class="links">
          <a href="/">Home →</a>
          <a href="/projects.html">Projects →</a>
          <a href="/writings.html">Writing →</a>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
