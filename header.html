<style>
header {
  width: 100%;
  max-width: 1180px;
  margin: 0 auto;
  padding: 18px 12px 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 24px;
}

header .brand {
  min-width: 0;
}

header .brand-pill {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  color: var(--text);
}

header .brand-mark {
  width: 78px;
  height: 78px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 0;
  border: 0;
  background: transparent;
  box-shadow: none;
  overflow: hidden;
  flex: 0 0 auto;
  margin-right: -8px;
}

header .brand-mark img {
  width: 78px;
  height: 78px;
  object-fit: contain;
  display: block;
}

header .brand-divider {
  width: 1px;
  height: 34px;
  background: linear-gradient(180deg, transparent, rgba(127,146,181,.45), transparent);
  flex: 0 0 auto;
}

header .brand-name {
  display: inline-flex;
  align-items: baseline;
  gap: 14px;
  min-width: 0;
  font-size: 22px;
  font-weight: 600;
  letter-spacing: .26em;
  text-transform: uppercase;
  white-space: nowrap;
}

header .brand-name .labs {
  color: #2d6ed8;
}

header nav {
  display: flex;
  align-items: center;
  gap: 28px;
  flex-wrap: wrap;
  justify-content: flex-end;
}

header nav a {
  position: relative;
  color: var(--text);
  font-size: 12px;
  letter-spacing: .22em;
  text-transform: uppercase;
  margin-left: 0;
  opacity: .82;
}

header nav a::after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  bottom: -7px;
  height: 1px;
  transform: scaleX(0);
  transform-origin: left;
  background: linear-gradient(90deg, #2d6ed8, rgba(45,110,216,0));
  transition: transform .25s ease;
}

header nav a:hover {
  opacity: 1;
}

header nav a:hover::after {
  transform: scaleX(1);
}

@media (max-width: 900px) {
  header {
    flex-direction: column;
    align-items: flex-start;
    gap: 16px;
  }

  header nav {
    gap: 18px;
    justify-content: flex-start;
  }
}

@media (max-width: 560px) {
  header {
    padding: 12px 0 8px;
    gap: 10px;
  }

  header .brand-pill {
    gap: 8px;
  }

  header .brand-mark {
    width: 58px;
    height: 58px;
    margin-right: -5px;
  }

  header .brand-mark img {
    width: 58px;
    height: 58px;
  }

  header .brand-divider {
    height: 24px;
  }

  header .brand-name {
    gap: 8px;
    font-size: 15px;
    letter-spacing: .16em;
  }

  header nav {
    gap: 4px;
    padding: 4px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,.08);
    background: rgba(255,255,255,.03);
  }

  header nav a {
    padding: 7px 10px;
    font-size: 10px;
    letter-spacing: .14em;
    border-radius: 999px;
  }

  header nav a::after {
    display: none;
  }

  header nav a:hover {
    background: rgba(96,165,250,.10);
  }
}
</style>

<header aria-label="Site header">
  <div class="brand">
    <a href="/" aria-label="Maevin Labs home" class="brand-pill">
      <span class="brand-mark">
        <img src="/assets/updated_nb.png" alt="" />
      </span>
      <span class="brand-divider" aria-hidden="true"></span>
      <span class="brand-name">
        <span>Maevin</span>
        <span class="labs">Labs</span>
      </span>
    </a>
  </div>

  <nav aria-label="Primary">
    <a href="/about.html">About</a>
    <a href="/support.html">Support</a>
    <a href="mailto:hello@maevinlabs.com">Contact</a>
  </nav>
</header>
